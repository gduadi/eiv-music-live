<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0f1a">
<title>EIV Music – כניסה</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="favicon-32.png">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--p1:#7b5ea7;--p2:#b06ab3;--bg:#0a0f1a;--card:rgba(255,255,255,.045);--bord:rgba(255,255,255,.09);--muted:#9ca3b8}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:radial-gradient(1200px 600px at 50% -10%,rgba(123,94,167,.22),transparent 60%),var(--bg);color:#fff;font-family:Heebo,sans-serif;display:flex;align-items:center;justify-content:center;padding:20px;overflow:hidden}
.shell{width:100%;max-width:420px;text-align:center;animation:rise .6s ease}
@keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.eq-logo{height:44px;display:flex;align-items:center;justify-content:center;gap:3px;margin:0 auto 10px;filter:drop-shadow(0 0 14px rgba(123,94,167,.7))}
.eq-logo i{display:block;width:5px;border-radius:999px;background:linear-gradient(180deg,#2df3ff,#7b5ea7,#b06ab3);animation:eq 1.1s ease-in-out infinite alternate}
.eq-logo i:nth-child(1){height:16px;animation-delay:.0s}.eq-logo i:nth-child(2){height:30px;animation-delay:.15s}.eq-logo i:nth-child(3){height:40px;animation-delay:.3s}.eq-logo i:nth-child(4){height:28px;animation-delay:.45s}.eq-logo i:nth-child(5){height:18px;animation-delay:.6s}
@keyframes eq{from{transform:scaleY(.55)}to{transform:scaleY(1)}}
.brand{font-size:26px;font-weight:900;letter-spacing:1px}
.brand small{display:block;font-size:12px;font-weight:500;color:var(--muted);letter-spacing:3px;margin-top:4px}
.step{display:none;margin-top:30px}
.step.on{display:block;animation:rise .4s ease}
.title{font-size:20px;font-weight:800;margin-bottom:6px}
.sub{font-size:13px;color:var(--muted);margin-bottom:22px}
.cards{display:grid;gap:14px}
.pcard{position:relative;border:1px solid var(--bord);background:var(--card);border-radius:20px;padding:20px 18px;color:#fff;text-align:right;cursor:pointer;display:flex;align-items:center;gap:16px;transition:.2s;font-family:Heebo}
.pcard:active{transform:scale(.97)}
.pcard .ico{width:54px;height:54px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:27px;flex-shrink:0}
.pcard.reg .ico{background:linear-gradient(135deg,rgba(35,124,255,.25),rgba(141,44,255,.25));border:1px solid rgba(99,130,255,.35)}
.pcard.ai .ico{background:linear-gradient(135deg,rgba(176,106,179,.25),rgba(123,94,167,.3));border:1px solid rgba(176,106,179,.4)}
.pcard b{display:block;font-size:17px;font-weight:900}
.pcard span{display:block;font-size:12.5px;color:var(--muted);margin-top:3px;line-height:1.4}
.pcard:hover{border-color:rgba(123,94,167,.55);background:rgba(123,94,167,.08)}
.code-wrap{margin:0 auto;max-width:300px}
.code-input{width:100%;height:62px;border-radius:18px;border:1px solid var(--bord);background:rgba(255,255,255,.05);color:#fff;font:900 26px Heebo;text-align:center;letter-spacing:10px;direction:ltr;outline:none;transition:.2s}
.code-input:focus{border-color:var(--p1);box-shadow:0 0 0 3px rgba(123,94,167,.22)}
.go-btn{margin-top:16px;width:100%;height:54px;border:0;border-radius:18px;background:linear-gradient(135deg,var(--p1),var(--p2));color:#fff;font:800 17px Heebo;cursor:pointer;box-shadow:0 12px 34px rgba(123,94,167,.35);transition:.2s}
.go-btn:active{transform:scale(.97)}
.go-btn:disabled{opacity:.55}
.back-btn{margin-top:14px;background:none;border:0;color:var(--muted);font:600 13px Heebo;cursor:pointer}
.err{margin-top:14px;min-height:20px;font-size:13.5px;font-weight:700;color:#ff8a8a}
.chosen-pill{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--bord);background:var(--card);border-radius:999px;padding:7px 16px;font-size:13px;color:#cdd3e6;margin-bottom:18px}
.spin{width:20px;height:20px;border:3px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:rot .8s linear infinite;display:inline-block;vertical-align:middle}
@keyframes rot{to{transform:rotate(360deg)}}
.foot{margin-top:34px;font-size:11px;color:rgba(255,255,255,.25);letter-spacing:2px}
</style>
</head>
<body>
<div class="shell">
  <div class="eq-logo"><i></i><i></i><i></i><i></i><i></i></div>
  <div class="brand">EIV MUSIC<small>PREMIUM BUSINESS AUDIO</small></div>

  <!-- שלב 1: בחירת נגן -->
  <div class="step on" id="stepChoose">
    <div class="title">איך תרצה לנגן?</div>
    <div class="sub">בחר את סוג הנגן של העסק שלך</div>
    <div class="cards">
      <button class="pcard reg" onclick="choose('regular')">
        <div class="ico">🎵</div>
        <div><b>נגן רגיל</b><span>ערוצי מוזיקה מלאים · להיטים וקלאסיקות</span></div>
      </button>
      <button class="pcard ai" onclick="choose('ai')">
        <div class="ico">🤖</div>
        <div><b>נגן AI</b><span>מוזיקה מקורית ללא תמלוגים · מתחדשת תמיד</span></div>
      </button>
    </div>
  </div>

  <!-- שלב 2: קוד לקוח -->
  <div class="step" id="stepCode">
    <div class="chosen-pill" id="chosenPill"></div>
    <div class="title">קוד לקוח</div>
    <div class="sub">הזן את הקוד האישי שקיבלת</div>
    <div class="code-wrap">
      <input class="code-input" id="codeInput" maxlength="8" autocomplete="one-time-code" inputmode="text" placeholder="••••">
      <button class="go-btn" id="goBtn" onclick="enter()">כניסה</button>
      <div class="err" id="errBox"></div>
      <button class="back-btn" onclick="back()">→ חזרה לבחירת נגן</button>
    </div>
  </div>

  <div class="foot">EIV MUSIC © מערכת מוזיקה לעסקים</div>
</div>

<script>
const SUPABASE_URL = "https://lhnjxtwmngfsetgzqjts.supabase.co";
const SUPABASE_KEY = "sb_publishable_9nbM2jActQcpUhPzUemOVA_z2R0TRJd";

// יעדי ההפניה — אפשר לעדכן כאן בלי לגעת בשום דבר אחר
const PLAYER_URLS = {
  regular: "index.html",                        // הנגן הרגיל באותו אתר
  ai:      "https://ai-rashet.netlify.app/"     // נגן ה-AI
};

let picked = null;
const $ = id => document.getElementById(id);

function choose(type){
  picked = type;
  $("chosenPill").textContent = type === 'ai' ? '🤖 נגן AI — ללא תמלוגים' : '🎵 נגן רגיל';
  $("stepChoose").classList.remove("on");
  $("stepCode").classList.add("on");
  $("errBox").textContent = "";
  setTimeout(()=>$("codeInput").focus(), 150);
}
function back(){
  picked = null;
  $("stepCode").classList.remove("on");
  $("stepChoose").classList.add("on");
  $("codeInput").value = "";
  $("errBox").textContent = "";
}

async function enter(){
  const code = $("codeInput").value.trim().toUpperCase();
  const err = $("errBox");
  err.textContent = "";
  if(!code){ err.textContent = "הכנס קוד"; return; }

  const btn = $("goBtn");
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>';

  try{
    const res = await fetch(SUPABASE_URL + "/rest/v1/clients?code=eq." + encodeURIComponent(code) + "&select=code,active,player_access", {
      headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY }
    });
    const data = await res.json();
    const client = (data && data.length) ? data[0] : null;

    if(!client){ fail("קוד לא תקין ❌"); return; }
    if(client.active !== true){ fail("הקוד חסום 🔒 נא לפנות לשירות הלקוחות"); return; }

    const access = client.player_access || "regular";
    const allowed = (access === "both") || (access === picked);
    if(!allowed){
      fail("הקוד שלך אינו מורשה לנגן זה. נא לפנות לשירות הלקוחות.");
      return;
    }

    // מורשה — הפניה לנגן המתאים
    if (picked === 'regular') {
      // אותו דומיין — מעבירים דרך sessionStorage והנגן נכנס אוטומטית
      sessionStorage.setItem("eiv_gate", JSON.stringify({code: code, player: 'regular', t: Date.now()}));
      location.href = PLAYER_URLS.regular;
    } else {
      // נגן AI — דומיין אחר, מעבירים בכתובת והנגן נכנס אוטומטית
      location.href = PLAYER_URLS.ai + "?gate=1&id=" + encodeURIComponent(code);
    }
  }catch(e){
    fail("שגיאת חיבור, נסה שוב");
  }

  function fail(msg){
    err.textContent = msg;
    btn.disabled = false;
    btn.textContent = "כניסה";
  }
}

$("codeInput").addEventListener("keydown", e => { if(e.key === "Enter") enter(); });
</script>
</body>
</html>
