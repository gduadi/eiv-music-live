<script>
const SB_URL = 'https://lhnjxtwmngfsetgzqjts.supabase.co';
const SB_KEY = 'sb_publishable_9nbM2jActQcpUhPzUemOVA_z2R0TRJd';

async function doLogout() {
  const code = localStorage.getItem('eiv_code');
  const deviceId = localStorage.getItem('eiv_device');

  // Clear device_id from Supabase
  if (code) {
    try {
      await fetch(SB_URL + '/rest/v1/clients?code=eq.' + encodeURIComponent(code), {
        method: 'PATCH',
        headers: {
          'apikey': SB_KEY,
          'Authorization': 'Bearer ' + SB_KEY,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ device_id: null, pending_device: null })
      });
    } catch(e) {}
  }

  // Clear all local storage
  localStorage.clear();
  sessionStorage.clear();

  // Go back to player
  window.location.replace('https://app.eiv-music.com/');
}

doLogout();
